<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <title>lista Usuario</title>
</head>
<body>
<div>
    <table>
        <tr th:each="productos : ${productos}">
            <th> codigo</th>
            <th> nombre</th>
            <th> cedula</th>
            <th> stock</th>
            <th> opciones</th>
        </tr>
        <tbody>
        <tr th:each="usuario : ${usuario}">
            <td th:text="${usuario.id}"></td>
            <td th:text="${usuario.nombre}"></td>
            <td th:text="${usuario.cedula}"></td>
            <td th:text="${usuario.compra}"></td>
            <td>
                <a th:href="@{/editar/{id}(id=${usuarioLista.id})}" class="btn">Actualizar</a>
                <a th:href="@{/eliminiar/{id}(id=${usuarioLista.id})}" class="btn">eliminar</a>

            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/formularioUsuario}" class="btn"> nuevo usuario</a>

</div>

</body>
</html>
