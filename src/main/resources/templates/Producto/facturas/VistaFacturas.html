<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <title>Facturas</title>
</head>
<body>
<form th:action="@{/facturas}" method="get" class="mb-4">
    <div class="mb-3">
        <label for="numeroFactura" class="form-label"> numero de factura </label>
        <input type="number"id="numeroFactura" class="form-control"
               placeholder="buscar numero de factura"></input>

    </div>
        <button type="button" class="btn btn-primary" >buscar</button>
</form>
<form th:action="@{/productos}" th:object="${producto}" method="post" class="mb-3">
    <div class="input-group">
        <input type="text" name = buscarProducto class="form-control" placeholder="Buscar" th:value="${buscarProducto}">
        <button type="submit" class="btn btn-primary">Buscar</button>
    </div>
</form>
<div>
    <table>
        <tr>
            <th> codigo</th>
            <th> nombre</th>
            <th> precio</th>
            <th> stock</th>
            <th> opciones</th>
        </tr>
        <tbody>
        <tr th:each="producto : ${productos}">
            <td th:text="${producto.id}"></td>
            <td th:text="${producto.nombre}"></td>
            <td th:text="${producto.precio}"></td>
            <td th:text="${producto.stock}"></td>
            <td>


            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/formulario}" class="btn"> nuevo producto</a>

</div>

</body>
</html>
